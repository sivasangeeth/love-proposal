<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
body {
    margin: 0;
    text-align: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    overflow: hidden;
    color: white;
}

h1 {
    margin-top: 50px;
    font-size: 2rem;
}

/* Buttons */
button {
    padding: 12px 22px;
    font-size: 16px;
    margin: 10px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

#yesBtn { background: #00c853; color: white; }
#noBtn { background: #d50000; color: white; position: absolute; }

/* Slideshow */
#slideshow {
    display: none;
    margin-top: 20px;
    position: relative;
}

#slideshow img {
    width: 260px;
    height: 340px;
    border-radius: 20px;
    object-fit: cover;
    opacity: 0;
    transform: scale(1);
    transition: opacity 1.5s ease-in-out, transform 3s ease-in-out;
    box-shadow: 0 0 25px rgba(255,255,255,0.6);
}

#slideshow img.show {
    opacity: 1;
    transform: scale(1.08);
}

/* Watermark */
#watermark {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 10px;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Game hearts */
.game-heart {
    position: absolute;
    font-size: 28px;
    cursor: pointer;
}

/* Love letter */
#letter {
    display: none;
    position: fixed;
    top: 15%;
    left: 10%;
    width: 80%;
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
}

/* Fireworks */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<h1 id="proposal">Hariny, will you marry me? 💍</h1>

<button id="yesBtn" disabled>Locked 🔒</button>
<button id="noBtn">No 😜</button>

<div id="message"></div>
<div id="gameText">Catch 5 hearts to unlock love ❤️</div>

<div id="slideshow">
    <img id="photo" src="photo1.jpeg">
    <div id="watermark">Hariny ❤️</div>
</div>

<div id="letter">
    <h2>My Love ❤️</h2>
    <p>
        You are my today and all of my tomorrows.  
        I promise to love you endlessly, support you always,  
        and walk with you through every moment of life. 💖  
    </p>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>
// NO button
const lines = ["Are you sure? 🥺","Think again ❤️","You are my world 💕"];
document.getElementById("noBtn").onmouseover = function(){
    this.style.left = Math.random()*80+"%";
    this.style.top = Math.random()*80+"%";
    document.getElementById("message").innerHTML =
        lines[Math.floor(Math.random()*lines.length)];
};

// GAME
let score = 0;
const target = 5;

function spawnHeart(){
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.className = "game-heart";
    heart.style.left = Math.random()*90+"%";
    heart.style.top = Math.random()*80+"%";
    document.body.appendChild(heart);

    heart.onclick = function(){
        heart.remove();
        score++;
        document.getElementById("gameText").innerHTML =
            `Hearts: ${score} ❤️`;

        if(score >= target) unlockLove();
    };

    setTimeout(()=>heart.remove(),2000);
}
setInterval(spawnHeart,800);

function unlockLove(){
    const btn = document.getElementById("yesBtn");
    btn.disabled = false;
    btn.innerHTML = "Yes ❤️ (Unlocked)";
    document.getElementById("gameText").innerHTML =
        "You unlocked my heart 💖";
}

// YES
document.getElementById("yesBtn").onclick = function(){
    document.getElementById("proposal").innerHTML = "She said YES! 💍❤️";
    document.getElementById("letter").style.display="block";
    document.getElementById("slideshow").style.display="block";
    document.getElementById("music").play();

    startSlideshow();
    startFireworks();
};

// SLIDESHOW
const photos = [
 "photo1.jpeg","photo2.jpeg","photo3.jpeg","photo4.jpeg","photo5.jpeg"
];

let i=0, paused=false;

function showPhoto(index){
    const img=document.getElementById("photo");
    img.classList.remove("show");

    setTimeout(()=>{
        img.src=photos[index];
        img.classList.add("show");
    },300);
}

function startSlideshow(){
    showPhoto(i);
    setInterval(()=>{
        if(!paused){
            i=(i+1)%photos.length;
            showPhoto(i);
        }
    },3000);
}

// Pause/resume
document.getElementById("photo").onclick=function(){
    paused=!paused;
    document.getElementById("message").innerHTML =
        paused?"Paused 💕":"Playing ❤️";
};

// Floating hearts
setInterval(()=>{
    const h=document.createElement("div");
    h.innerHTML="❤️";
    h.className="heart";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},300);

// Fireworks
function startFireworks(){
    const c=document.getElementById("fireworks");
    const ctx=c.getContext("2d");
    c.width=window.innerWidth;
    c.height=window.innerHeight;

    setInterval(()=>{
        const x=Math.random()*c.width;
        const y=Math.random()*c.height/2;
        for(let i=0;i<20;i++){
            ctx.beginPath();
            ctx.arc(x,y,Math.random()*3,0,2*Math.PI);
            ctx.fillStyle="white";
            ctx.fill();
        }
    },200);
}
</script>

</body>
</html>
